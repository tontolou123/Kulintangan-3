<!DOCTYPE html>
<html>
<head>

<title>Kulintangan</title>

<style>

    .deleteTuning {

    float: right;

    background: none;

    border: none;

    cursor: pointer;

    font-size: 16px;

}
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: black;
    color: white;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
}


/* Top left settings */

#savedMenuButton {

    position: absolute;

    top: 35px;

    left: 35px;

    font-size: 30px;

    cursor: pointer;

    background: none;

    border: none;

    color: white;

    transition: transform 0.3s ease;


}

   #savedMenuButton.active {

    transform: rotate(90deg);
       transform-origin: center;

} 


/* Saved tuning popup */

#savedPanel {

opacity: 0;

visibility: hidden;

transform: translateY(-15px);

transition: opacity 0.25s ease, transform 0.25s ease;

    position: absolute;

    top: 80px;

    left: 35px;

    width: 220px;

    background: #111;

    border: 1px solid white;

    border-radius: 12px;

    padding: 15px;

    z-index: 10;

}
    #savedPanel.show {

    opacity: 1;

    visibility: visible;

    transform: translateY(0);

}


#savedPanel h3 {

    margin-top: 0;

    text-align: center;

}



.savedItem {

    background: white;

    color: black;

    padding: 8px;

    margin-top: 8px;

    border-radius: 6px;

    cursor: pointer;

    .savedItem {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
}



/* Instrument row */


.container {

    display: flex;

    justify-content: center;

    gap: 20px;

    position: absolute;

    top: 38%;

    left: 50%;

    transform: translate(-50%, -50%);

}



.instrument {

    text-align: center;

    position: relative;

}



.circle {

    width: 55px;

    height: 55px;

    background: white;

    color: black;

    border-radius: 50%;


    display: flex;

    justify-content: center;

    align-items: center;


    font-size: 24px;

    font-weight: bold;


    cursor: pointer;

    transition: transform 0.1s, box-shadow 0.1s;

}



.circle.hit {

    transform: scale(0.85);

    box-shadow: 0 0 25px white;

}




.cog {

    margin-top: 12px;

    background: transparent;

    border: none;

    outline: none;

    box-shadow: none;

    appearance: none;
    -webkit-appearance: none;

    color: white;

    font-size: 22px;

    cursor: pointer;

    transition: transform 0.3s ease;

}

.cog:focus,
.cog:active,
.cog:focus-visible {

    outline: none;

    box-shadow: none;

}




.cog.active {
    transform: rotate(90deg);
    transform-origin: center;
}







.pitchBox {


    display: none;


    position: absolute;


    top: 95px;


    left: 50%;


    transform: translateX(-50%);


    background: #111;


    border-radius: 10px;


    padding: 10px;


    height: 220px;


    z-index: 5;

}



.slider {


    appearance: slider-vertical;


    writing-mode: bt-lr;


    height: 150px;


}



.midline {


    position: absolute;


    width: 45px;


    height: 2px;


    background: white;


    top: 85px;


    left: 50%;


    transform: translateX(-50%);


}



.resetPitch {


    margin-top: 8px;


    background: white;


    color: black;


    border: none;


    border-radius: 5px;


    cursor: pointer;


}




#resetAll {

    position: absolute;

    bottom: 140px;

    left: 50%;

    transform: translateX(-50%);

    padding: 10px 28px;

    font-size: 16px;

    border-radius: 8px;

    border: none;

    cursor: pointer;

}
/* Save button */


#saveTuning {


    position: absolute;


    bottom: 80px;


    left: 50%;


    transform: translateX(-50%);


    padding: 12px 30px;


    font-size: 16px;


    border-radius: 8px;


    border: none;


    cursor: pointer;


}





/* Save popup */


#savePopup {


    display: none;


    position: absolute;


    top: 50%;


    left: 50%;


    transform: translate(-50%, -50%);


    background: #111;


    border: 1px solid white;


    padding: 25px;


    border-radius: 12px;


    text-align: center;


    z-index: 20;


}



#savePopup input {


    width: 200px;


    padding: 8px;


    margin: 15px;


}



.popupButton {


    padding: 8px 18px;


    margin: 5px;


    cursor: pointer;


}



</style>


</head>



<body>



<button id="savedMenuButton">⚙</button>


<div id="savedPanel">

<h3>Saved Tunings</h3>

<div id="savedList"></div>

</div>





<div class="container" id="container"></div>



<button id="resetAll">
Reset Tuning
</button>

<button id="saveTuning">
Save Tuning
</button>





<div id="savePopup">


<h3>Name this tuning</h3>


<input 
id="tuningName"
maxlength="20"
placeholder="Maximum 20 characters">


<br>


<button class="popupButton" id="cancelSave">
Cancel
</button>


<button class="popupButton" id="confirmSave">
Confirm
</button>


</div>
<script>
const audioContext = new (window.AudioContext || window.webkitAudioContext)();

let sounds = {};
let pitchValues = {};
let sliders = [];
let instruments = [];
let unsavedChanges = false;


// Unlock audio after first interaction

document.addEventListener("click", () => {

    if (audioContext.state === "suspended") {
        audioContext.resume();
    }

}, { once: true });



// Create instruments

const container = document.getElementById("container");


for (let i = 1; i <= 9; i++) {

    let div = document.createElement("div");

    div.className = "instrument";


    div.innerHTML = `

    <div class="circle">${i}</div>

    <button class="cog">⚙</button>

    <div class="pitchBox">

        <div class="midline"></div>

        <input 
        class="slider"
        type="range"
        min="-6"
        max="6"
        step="0.01"
        value="0">

        <br>

        <button class="resetPitch">
        Reset
        </button>

    </div>

    `;


    container.appendChild(div);

    pitchValues[i] = 0;

    instruments.push(div);

}



// Load sounds

async function loadSounds(){

    for(let i = 1; i <= 9; i++){

        try {

            let response = await fetch(i + ".wav");

            let data = await response.arrayBuffer();

            sounds[i] = await audioContext.decodeAudioData(data);

        }

        catch(error){

            console.log("Sound error:", i, error);

        }

    }

}


loadSounds();





// Play sound

function playSound(number){


    if(!sounds[number]) return;


    let source = audioContext.createBufferSource();


    source.buffer = sounds[number];


    source.playbackRate.value =
    Math.pow(2, pitchValues[number] / 12);



    source.connect(audioContext.destination);


    source.start();

    if (!window.activeSources) {
    window.activeSources = [];
}

window.activeSources.push(source);

source.onended = () => {

    const i = window.activeSources.indexOf(source);

    if (i !== -1) {
        window.activeSources.splice(i, 1);
    }

};



    let circle =
    instruments[number - 1].querySelector(".circle");


    circle.classList.remove("hit");


    void circle.offsetWidth;


    circle.classList.add("hit");


    setTimeout(()=>{

        circle.classList.remove("hit");

    },120);

}





// Controls

instruments.forEach((item,index)=>{


    let number = index + 1;


    let circle = item.querySelector(".circle");

    let cog = item.querySelector(".cog");

    let box = item.querySelector(".pitchBox");

    let slider = item.querySelector(".slider");

    let reset = item.querySelector(".resetPitch");



    sliders.push(slider);



    circle.onclick = ()=>{

        playSound(number);

    };



    slider.oninput = ()=>{

        pitchValues[number] = Number(slider.value);

        unsavedChanges = true;

        document.getElementById("saveTuning").innerText =
        "Save Tuning";

    };



    reset.onclick = ()=>{

        slider.value = 0;

        pitchValues[number] = 0;

        unsavedChanges = true;

        document.getElementById("saveTuning").innerText =
        "Save Tuning";

    };



  cog.onclick = (e)=>{

    e.stopPropagation();


    document.querySelectorAll(".pitchBox")
    .forEach(x=>{

        if(x !== box)
            x.style.display="none";

    });


    document.querySelectorAll(".cog")
    .forEach(x=>{

        if(x !== cog)
            x.classList.remove("active");

    });



    if(box.style.display === "block"){

        box.style.display = "none";

        cog.classList.remove("active");

    }

    else {

        box.style.display = "block";

        cog.classList.add("active");

    }


};

   


    box.onclick = e=>e.stopPropagation();


});





// Keyboard

let keysDown = {};

document.addEventListener("keydown", e => {

    if(e.repeat) return;


    if(e.key >= "1" && e.key <= "9"){

        if(!keysDown[e.key]){

            keysDown[e.key] = true;

            playSound(Number(e.key));

        }

    }

});


document.addEventListener("keyup", e => {

    if(e.key >= "1" && e.key <= "9"){

        keysDown[e.key] = false;

    }

});





// SAVE SYSTEM


const saveButton =
document.getElementById("saveTuning");
    
const resetAllButton =
document.getElementById("resetAll");

    resetAllButton.onclick = ()=>{


    for(let i = 1; i <= 9; i++){


        pitchValues[i] = 0;


        sliders[i-1].value = 0;


    }


    unsavedChanges = true;


    saveButton.innerText = "Save Tuning";


};

const savePopup =
document.getElementById("savePopup");


const tuningName =
document.getElementById("tuningName");


const confirmSave =
document.getElementById("confirmSave");


const cancelSave =
document.getElementById("cancelSave");





saveButton.onclick = ()=>{

    savePopup.style.display="block";

};





cancelSave.onclick = ()=>{

    savePopup.style.display="none";

};





confirmSave.onclick = ()=>{


    let name = tuningName.value.trim();


    if(name === "") return;



    let saved =
    JSON.parse(localStorage.getItem("tunings")) || {};



    saved[name] = {...pitchValues};



    localStorage.setItem(
        "tunings",
        JSON.stringify(saved)
    );



    savePopup.style.display="none";


    saveButton.innerText="Tuning Saved";


    unsavedChanges=false;


    updateSavedList();


};






// Saved menu


const savedButton =
document.getElementById("savedMenuButton");


const savedPanel =
document.getElementById("savedPanel");


const savedList =
document.getElementById("savedList");




savedButton.onclick = e=>{

    e.stopPropagation();

    updateSavedList();


    if(savedPanel.classList.contains("show")){

        savedPanel.classList.remove("show");

        savedButton.classList.remove("active");

    }

    else {

        savedPanel.classList.add("show");

        savedButton.classList.add("active");

    }

};







function updateSavedList(){


    savedList.innerHTML="";


    let saved =
    JSON.parse(localStorage.getItem("tunings")) || {};



    Object.keys(saved).forEach(name=>{


        let item =
        document.createElement("div");


        item.className="savedItem";


       item.innerHTML = `

<span>${name}</span>

<button class="deleteTuning">
🗑
</button>

`;
        let deleteButton = item.querySelector(".deleteTuning");


deleteButton.onclick = (e)=>{

    e.stopPropagation();


    let saved =
    JSON.parse(localStorage.getItem("tunings")) || {};


    delete saved[name];


    localStorage.setItem(
        "tunings",
        JSON.stringify(saved)
    );


    updateSavedList();

};



        item.onclick=()=>{


            for(let i=1;i<=9;i++){


                pitchValues[i]=saved[name][i];


                sliders[i-1].value=saved[name][i];


            }


            saveButton.innerText="Tuning Saved";


            savedPanel.style.display="none";


        };



        savedList.appendChild(item);


    });


}





document.addEventListener("click",()=>{


    document.querySelectorAll(".pitchBox")
    .forEach(x=>x.style.display="none");


    savedPanel.style.display="none";


});




</script>



</body>
</html>
